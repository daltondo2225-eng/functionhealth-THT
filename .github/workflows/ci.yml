name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend tests (xUnit + SQLite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore TodoApi.sln
      - run: dotnet build TodoApi.sln --no-restore -c Release
      - run: dotnet test TodoApi.sln --no-build -c Release --logger "console;verbosity=normal"

  frontend:
    name: frontend tests (vitest + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -b --noEmit
      - run: npm test -- --run
      - run: npm run build
